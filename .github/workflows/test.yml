name: Lightweight Dockerized CI Pipeline

on: [push]

jobs:
  ci-container-pipeline:
    runs-on: ubuntu-latest
    steps:
      # CI
      - name: Fetch Code from Repository
        uses: actions/checkout@v4

      - name: Setup Node Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Run Native Tests
        run: |
          npm install
          npm test

      # DOCKER INTEGRATION
      - name: Compile and Build Docker Container Image
        run: |
          docker build -t ci-light-engine:latest .

      - name: Verify Container Safety and Execution
        run: |
          docker run --rm ci-light-engine:latest npm test
